name: Build V-Rise APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Unzip V-Rise project
        run: |
          unzip -q V-Rise_Pro_Under25MB_NoIssue.zip -d extracted
          ls extracted

      - name: Build APK
        working-directory: extracted/V-Rise_Pro_Under25MB_NoIssue/android
        run: gradle :app:assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: V-Rise-APK
          path: extracted/V-Rise_Pro_Under25MB_NoIssue/android/app/build/outputs/apk/debug/app-debug.apk
